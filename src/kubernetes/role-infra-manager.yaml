apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vendor-envoy-gateway-infra-manager
  namespace: '${Environment}'
  labels:
    app.kubernetes.io/name: vendor-envoy-gateway-infra-manager
    app.kubernetes.io/instance: vendor-envoy-gateway
    app.kubernetes.io/version: "${Version}"
    app.kubernetes.io/managed-by: Kaptain
    app: vendor-envoy-gateway-infra-manager
    kaptain.org/environment: ${Environment}
    kaptain.org/project-name: ${ProjectName}
    kaptain.org/version: "${Version}"
    kaptain.org/owner: kube-kaptain
  annotations:
    kaptain.org/helm-upstream-chart: gateway-helm-1.7.1
    kaptain.org/generated-by: Generated by Kaptain vendor-helm-render-and-process
    kaptain.org/source-repository: kube-kaptain/vendor-envoy-gateway
rules:
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
      - services
      - configmaps
    verbs:
      - create
      - get
      - list
      - delete
      - deletecollection
      - patch
  - apiGroups:
      - apps
    resources:
      - deployments
      - daemonsets
    verbs:
      - create
      - get
      - delete
      - deletecollection
      - patch
  - apiGroups:
      - autoscaling
      - policy
    resources:
      - horizontalpodautoscalers
      - poddisruptionbudgets
    verbs:
      - create
      - get
      - list
      - delete
      - deletecollection
      - patch
  - apiGroups:
      - certificates.k8s.io
    resources:
      - clustertrustbundles
    verbs:
      - list
      - get
      - watch
