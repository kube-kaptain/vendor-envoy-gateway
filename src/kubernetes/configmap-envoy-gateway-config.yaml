# Source: gateway-helm/templates/envoy-gateway-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-gateway-config
  namespace: '${Environment}'
  labels:
    app.kubernetes.io/name: envoy-gateway-config
    app.kubernetes.io/instance: vendor-envoy-gateway
    app.kubernetes.io/version: "${Version}"
    app.kubernetes.io/managed-by: Kaptain
    app: envoy-gateway-config
    kaptain.org/environment: ${Environment}
    kaptain.org/project-name: ${ProjectName}
    kaptain.org/version: "${Version}"
    kaptain.org/owner: kube-kaptain
  annotations:
    kaptain.org/helm-upstream-chart: gateway-helm-1.7.1
    kaptain.org/generated-by: Generated by Kaptain vendor-helm-render-and-process
    kaptain.org/source-repository: kube-kaptain/vendor-envoy-gateway
data:
  envoy-gateway.yaml: |
    apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: EnvoyGateway
    extensionApis: {}
    gateway:
      controllerName: gateway.envoyproxy.io/${Environment}-gatewayclass-controller
    logging:
      level:
        default: info
    provider:
      kubernetes:
        deploy:
          type: GatewayNamespace
        rateLimitDeployment:
          container:
            image: ${VendorEnvoyGateway/EnvironmentDockerRegistryAndNamespace}/${DockerImageName}:${DockerTagRatelimit}
          patch:
            type: StrategicMerge
            value:
              spec:
                template:
                  spec:
                    containers:
                    - imagePullPolicy: IfNotPresent
                      name: envoy-ratelimit
        shutdownManager:
          image: ${VendorEnvoyGateway/EnvironmentDockerRegistryAndNamespace}/${DockerImageName}:${DockerTagGateway}
      type: Kubernetes
      watch:
        type: Namespaces
        namespaces: [${VendorEnvoyGateway/MonitoredNamespaceList}]
